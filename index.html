<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAEDIE NEXUS | Secure System</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --nexus-blue: #0062ff;
            --nexus-dark: #020617;
            --accent-cyan: #00f2ff;
            --glass: rgba(15, 23, 42, 0.95);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--nexus-dark); color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }

        /* --- 1. BOOT LOADER --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--nexus-dark); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }
        .bar-container { width: 150px; height: 2px; background: rgba(255,255,255,0.05); margin-top: 20px; }
        .bar-progress { height: 100%; background: var(--nexus-blue); width: 0; animation: load 2s forwards; }
        @keyframes load { to { width: 100%; } }

        /* --- 2. THE VAULT DOOR (ENTER BUTTON) --- */
        #vault-screen {
            display: none; height: 100vh; width: 100%; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: radial-gradient(circle at center, rgba(0,98,255,0.1) 0%, transparent 70%);
        }
        .enter-btn {
            padding: 25px 50px; border: 2px solid var(--nexus-blue); background: transparent;
            color: white; font-family: 'Syncopate', sans-serif; font-size: 1rem;
            letter-spacing: 5px; cursor: pointer; border-radius: 50px; transition: 0.3s;
            box-shadow: 0 0 20px rgba(0,98,255,0.2);
        }
        .enter-btn:hover { background: var(--nexus-blue); box-shadow: 0 0 40px var(--nexus-blue); }
        .enter-btn:active { transform: scale(0.9); }

        /* --- 3. MAIN SYSTEM (PRODUCTS) --- */
        #main-site { display: none; height: 100vh; overflow-y: auto; }
        nav { padding: 20px; display: flex; justify-content: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 4px; }
        .logo span { color: var(--nexus-blue); }

        .container { padding: 20px; }
        .card { background: var(--glass); padding: 25px; border-radius: 20px; border: 1px solid #1e293b; margin-bottom: 20px; }
        .card h3 { color: var(--accent-cyan); font-family: 'Syncopate', sans-serif; font-size: 0.8rem; margin: 0; }
        .price { font-size: 1.6rem; font-weight: 800; display: block; margin: 15px 0; }

        /* FORM POPUP */
        #orderModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: #0f172a; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px;
            border: 1px solid var(--nexus-blue);
        }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #1e293b; background: #020617; color: white; outline: none; }

        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.15s; }
        .btn:active { transform: scale(0.94); }
        .btn-blue { background: var(--nexus-blue); color: white; }
        .btn-outline { background: transparent; color: #475569; margin-top: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body onload="bootSystem()">

    <div id="loader">
        <div style="font-family: 'Syncopate', sans-serif; font-size: 0.6rem; color: var(--accent-cyan); letter-spacing: 3px;">BOOTING SYSTEM...</div>
        <div class="bar-container"><div class="bar-progress"></div></div>
    </div>

    <div id="vault-screen">
        <p style="color: var(--nexus-blue); letter-spacing: 5px; font-size: 0.6rem; margin-bottom: 20px;">ACCESS GRANTED</p>
        <button class="enter-btn" onclick="openSystem()">OPEN NEXUS</button>
        <p style="margin-top: 30px; font-size: 0.7rem; color: #475569;">SECURED BY LADDIE EARL CANDAL</p>
    </div>

    <div id="main-site">
        <nav><div class="logo">MAEDIE<span>NEXUS</span></div></nav>
        
        <div class="container">
            <h1 style="text-align: center; font-size: 2rem; margin-top: 40px; font-family: 'Syncopate', sans-serif;">IT ASSETS</h1>
            
            <div class="card">
                <h3>Nexus Core OS</h3>
                <span class="price">₱145,000.00</span>
                <button class="btn btn-blue" onclick="openModal('Nexus Core OS', '145,000')">ACQUIRE UNIT</button>
            </div>

            <div class="card">
                <h3>Titan Firewall</h3>
                <span class="price">₱85,500.00</span>
                <button class="btn btn-blue" onclick="openModal('Titan Firewall', '85,500')">ACQUIRE UNIT</button>
            </div>

            <div class="card">
                <h3>Quantum Rack</h3>
                <span class="price">₱1,200,000.00</span>
                <button class="btn btn-blue" onclick="openModal('Quantum Rack', '1,200,000')">ACQUIRE UNIT</button>
            </div>
        </div>
    </div>

    <div id="orderModal">
        <div class="modal-content">
            <h2 style="font-family: 'Syncopate', sans-serif; font-size: 0.7rem; color: var(--accent-cyan); text-align: center; margin-bottom: 25px;">ORDER AUTHENTICATION</h2>
            <input type="text" id="custName" placeholder="Full Name" required>
            <input type="text" id="custPhone" placeholder="Mobile Number" required>
            <input type="text" id="custCountry" placeholder="Country" required>
            <input type="text" id="custCity" placeholder="City" required>
            <input type="text" id="custAddress" placeholder="Address" required>
            <button class="btn btn-blue" onclick="triggerConfettiOrder()">CONFIRM & SEND GMAIL</button>
            <button class="btn btn-outline" onclick="closeModal()">CANCEL</button>
        </div>
    </div>

    <script>
        let selectedProduct = "";
        let selectedPrice = "";
        const MY_EMAIL = "technologyladdie@gmail.com";

        // Step 1: Loading
        function bootSystem() {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('vault-screen').style.display = 'flex';
            }, 2500);
        }

        // Step 2: Open Main Site
        function openSystem() {
            document.getElementById('vault-screen').style.display = 'none';
            document.getElementById('main-site').style.display = 'block';
            document.body.style.overflow = 'auto'; // Allow scrolling
        }

        function openModal(p, pr) {
            selectedProduct = p;
            selectedPrice = pr;
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }

        function triggerConfettiOrder() {
            const name = document.getElementById('custName').value;
            if(!name) { alert("Please fill up the form."); return; }

            confetti({ particleCount: 250, spread: 100, origin: { y: 0.6 } });

            setTimeout(() => {
                const subject = encodeURIComponent(`ORDER: ${selectedProduct}`);
                const body = encodeURIComponent(`Product: ${selectedProduct}\nPrice: ${selectedPrice}\nName: ${name}\nPhone: ${document.getElementById('custPhone').value}\nAddress: ${document.getElementById('custAddress').value}`);
                window.location.href = `mailto:${MY_EMAIL}?subject=${subject}&body=${body}`;
            }, 1000);
        }
    </script>
</body>
</html>
